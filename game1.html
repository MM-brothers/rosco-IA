<!doctype html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Rosco - Pasapalabra (Sketch)</title>
        <link rel="stylesheet" href="game1.css">
        <script src="game1-1.js" async defer></script>
        <style>
            html,body{height:100%;}
        </style>
    </head>
    <body>
        <div class="container">
            <h1>Rosco de inteligencia artifical:</h1>
            <h2>Responde correctamente más del 75% de las preguntas para pasar de prueba</h2>
            <div id="rosco" class="rosco" aria-label="Rosco">
                <!-- letras generadas por JS -->
                <div class="hub" id="hub">
                    <div id="question">Haz clic en una letra</div>
                    <div class="controls">
                        <button id="passBtn">Pasar</button>
                        <button id="rightBtn">Acerté</button>
                        <button id="wrongBtn">Fallé</button>
                    </div>
                </div>
            </div>
            <p style="font-size:.9rem;color:#666;margin-top:8px">Atajos: ENTER = acerté · ESPACIO = pasar · Flechas = navegar</p>
        </div>
    </body>
</html>
